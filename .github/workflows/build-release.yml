name: CPython WASI Build

on:
  workflow_dispatch:
    inputs:
      cpython_branch:
        description: 'CPython branch to clone'
        required: true
        default: 'v3.14.3'
        type: string
      optimize_level:
        description: 'wasm-opt optimize level'
        required: true
        default: '4'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ github.token }}
    
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: CPython WASI Build in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ env.REPO_OWNER_LOWER }}/build_cpython_wasi
          cacheFrom: ghcr.io/${{ env.REPO_OWNER_LOWER }}/build_cpython_wasi
          push: always
          env: |
            CPYTHON_BRANCH=${{ inputs.cpython_branch }}
            OPTIMIZE_LEVEL=${{ inputs.optimize_level }}
          runCmd: ./build-wasi.sh

      - uses: actions/upload-artifact@v6
        with:
          name: CPython-WASI-${{ inputs.cpython_branch }}
          path: ./out/
          if-no-files-found: error
      
      - uses: actions/upload-artifact@v6
        with:
          name: for_external_builds
          path: ./out/for_external_builds/
          if-no-files-found: error
      
      - uses: actions/upload-artifact@v6
        with:
          name: lib
          path: ./out/lib/
          if-no-files-found: error
      
      - run: echo "WASM_FILE_NAME=$(basename ./out/python*.wasm)" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WASM_FILE_NAME }}
          path: ./out/${{ env.WASM_FILE_NAME }}
          if-no-files-found: error
      
      - run: echo "WASM_ASYNC_FILE_NAME=$(basename ./out/python*_async.wasm)" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WASM_ASYNC_FILE_NAME }}
          path: ./out/${{ env.WASM_ASYNC_FILE_NAME }}
          if-no-files-found: error
      
      - name: Create/Update release
        shell: bash
        run: |
          RELEASE_TAG="build-python-${{inputs.cpython_branch}}"
          RELEASE_NAME="CPython - ${{inputs.cpython_branch}}"
          RELEASE_NOTES_PATH="build-notes.md"
          zip -r "out.zip" "./out/"
          zip -r "for_external_builds.zip" "./out/for_external_builds"
          zip -r "lib.zip" "./out/lib"
          gh release delete --cleanup-tag --yes "$RELEASE_TAG" || echo "Release didn't exist yet, this is ok."
          gh release create --target "${{github.sha}}" --title "$RELEASE_NAME" --notes-file "$RELEASE_NOTES_PATH" --draft --prerelease "$RELEASE_TAG"
          gh release upload --clobber "$RELEASE_TAG" "out.zip" "for_external_builds.zip" "lib.zip" "./out/${{ env.WASM_FILE_NAME }}" "./out/${{ env.WASM_ASYNC_FILE_NAME }}"
          gh release edit "$RELEASE_TAG" --draft=false
